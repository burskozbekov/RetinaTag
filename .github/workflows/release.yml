name: Release RetinaTag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RetinaTag ${{ github.ref_name }}'
          releaseBody: |
            ## RetinaTag ${{ github.ref_name }}

            ### Kurulum
            - **Windows (Önerilen)**: `RetinaTag_x64-setup.exe` dosyasını indir ve çalıştır
            - **Windows MSI**: `RetinaTag_x64_en-US.msi` dosyasını indir ve çalıştır

            ### Otomatik Güncelleme
            Uygulamayı zaten kurduysanız, uygulama açıldığında otomatik olarak güncelleme bildirimi alacaksınız.
          releaseDraft: false
          prerelease: false
